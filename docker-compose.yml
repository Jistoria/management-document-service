services:
  postgres:
    image: postgres:16
    container_name: postgres-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: management_db
      POSTGRES_USER: user123
      POSTGRES_PASSWORD: pass123
    ports:
      - "5450:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user123"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
