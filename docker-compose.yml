services:
  # 1) JOB de init (migraciones/seed/caches)
  init:
    build:
      context: .
      dockerfile: php/Dockerfile
      args:
        UID: ${UID:-1000}
        GID: ${GID:-1000}
    image: management-app:prod
    container_name: management-init
    user: "0:0"
    env_file:
      - docker/app.env
      - docker/db.env
    depends_on:
      db:
        condition: service_healthy
    command: ["bash", "/var/www/scripts/init.sh"]
    restart: "no"
    networks:
      - management-net

  # 2) App PHP-FPM
  app:
    build:
      context: .
      dockerfile: php/Dockerfile
      args:
        UID: ${UID:-1000}
        GID: ${GID:-1000}
    image: management-app:prod
    container_name: management-app
    env_file:
      - docker/app.env
      - docker/db.env
    depends_on:
      db:
        condition: service_healthy
      init:
        condition: service_completed_successfully
    networks:
      - management-net
      - thesis-net
    restart: unless-stopped

  # 3) Nginx interno (solo localhost)
  nginx:
    image: nginx:alpine
    container_name: management-nginx
    depends_on: [app]
    ports:
      - "127.0.0.1:8002:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      # OJO: en prod NO montes ./public del host
      # El docroot debe estar dentro de la imagen; ver Dockerfile abajo
    networks:
      - management-net
      - thesis-net
    restart: unless-stopped

  # 4) Consumer Kafka (si lo mantienes)
  consumer-auth:
    build:
      context: .
      dockerfile: php/Dockerfile
      args:
        UID: ${UID:-1000}
        GID: ${GID:-1000}
    image: management-app:prod
    container_name: management-consumer-auth
    command: php artisan auth-sync:consume
    env_file:
      - docker/app.env
      - docker/db.env
    depends_on:
      db:
        condition: service_healthy
      init:
        condition: service_completed_successfully
    networks:
      - management-net
      - thesis-net
    restart: unless-stopped

  # 5) DB (no expuesta)
  db:
    image: postgres:16
    container_name: management-db
    env_file:
      - docker/db.env
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Si necesitas el SQL inicial, déjalo, pero ojo: solo corre en DB vacía
      - ./recreate_database_complete.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./docker/init-db.sh:/docker-entrypoint-initdb.d/02-init-db.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s
    networks:
      - management-net
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  thesis-net:
    external: true
  management-net:
    driver: bridge
