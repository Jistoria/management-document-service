services:
  init:
    build:
     context: .
     dockerfile: php/Dockerfile
    image: auth-app
    container_name: management-init
    volumes:
        - .:/var/www
    depends_on:
       db:
         condition: service_healthy
    command: ["bash", "/var/www/scripts/init.sh"]
    restart: "no"
    networks:
        - management-net

  db:
    image: postgres:16
    container_name: management-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: management_db
      POSTGRES_USER: user123
      POSTGRES_PASSWORD: pass123
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C"
    ports:
      - "5450:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Scripts de inicialización
      - ./recreate_database_complete.sql:/docker-entrypoint-initdb.d/recreate_database_complete.sql:ro
      - ./docker/db_sync_check.sql:/docker-entrypoint-initdb.d/db_sync_check.sql:ro
      - ./docker/init-db.sh:/docker-entrypoint-initdb.d/01-init-db.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user123 -d management_db"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
        - management-net


  # Servicio de verificación de base de datos (opcional para debugging)
  db-sync-checker:
    image: postgres:16
    container_name: db-sync-checker
    profiles: ["debug"]  # Solo se ejecuta con docker-compose --profile debug up
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGHOST: postgres
      PGDATABASE: management_db
      PGUSER: user123
      PGPASSWORD: pass123
    volumes:
      - ./docker/db_sync_check.sql:/app/db_sync_check.sql:ro
    command: >
      bash -c "
        echo '🔍 Ejecutando verificación de sincronización de DB...';
        psql -f /app/db_sync_check.sql;
        echo '✅ Verificación completada';
      "
    restart: "no"

  app:
    build:
      context: .
      dockerfile: php/Dockerfile
    image: management-app
    container_name: management-app
    volumes:
        - .:/var/www
    environment:
      - KAFKA_BROKERS=auth-kafka:9092
      - KAFKA_CLIENT_ID=management-service
      - KAFKA_SECURITY_PROTOCOL=PLAINTEXT
      - KAFKA_SASL_USERNAME=
      - KAFKA_SASL_PASSWORD=
      - KAFKA_SASL_MECHANISMS=
      - KAFKA_DEBUG=false
      - KAFKA_E2E=true
    networks:
        - thesis-net
        - management-net
    depends_on:
        db:
           condition: service_healthy

  nginx:
    image: nginx:alpine
    container_name: management-nginx
    ports:
      - "8002:80"
    volumes:
      - .:/var/www
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
        - management-net

  queue:
      image: management-app
      container_name: management-queue
      command: php artisan queue:work --verbose --tries=1 --timeout=90
      volumes:
          - .:/var/www
      depends_on:
          app:
              condition: service_started
          init:
              condition: service_completed_successfully
          db:
              condition: service_healthy

  scheduler:
      image: management-app
      container_name: management-scheduler
      command: php artisan schedule:work
      volumes:
          - .:/var/www
      depends_on:
          app:
              condition: service_started
          init:
              condition: service_completed_successfully
          db:
              condition: service_healthy


volumes:
  postgres_data:

networks:
    thesis-net:
        external: true
    management-net:
        driver: bridge
